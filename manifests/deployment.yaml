apiVersion: apps/v1
kind: Deployment
metadata:
  name: ngo-service
  namespace: solidarytech-ngo
  labels:
    app.kubernetes.io/name: ngo-service
    app.kubernetes.io/component: ngo
    app.kubernetes.io/part-of: solidarytech
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ngo-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: ngo-service
        app.kubernetes.io/name: ngo-service
        app.kubernetes.io/component: ngo
        app.kubernetes.io/part-of: solidarytech
    spec:
      initContainers:
        - name: build-db-url
          image: python:3.12-alpine
          command: ["/bin/sh", "-c"]
          args:
            - |
              python3 << 'EOF'
              import urllib.parse
              import os

              user = os.environ.get('DB_USER', '')
              password = os.environ.get('DB_PASSWORD', '')
              host = os.environ.get('DB_HOST', '')
              port = os.environ.get('DB_PORT', '5432')
              dbname = os.environ.get('DB_NAME', '')

              encoded_user = urllib.parse.quote(user, safe='')
              encoded_password = urllib.parse.quote(password, safe='')

              db_url = f"postgresql://{encoded_user}:{encoded_password}@{host}:{port}/{dbname}?sslmode=require"

              with open('/shared/database_url', 'w') as f:
                  f.write(db_url)

              print(f"DATABASE_URL criada para host: {host}")
              EOF
          env:
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: ngo-service-config
                  key: NGO_DB_HOST
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: ngo-service-config
                  key: NGO_DB_NAME
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: ngo-service-config
                  key: NGO_DB_PORT
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: ngo-service-rds
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ngo-service-rds
                  key: password
          volumeMounts:
            - name: shared-data
              mountPath: /shared

      containers:
        - name: ngo-service
          # Tag atualizada automaticamente pelo CI do repo ngo-service.
          image: ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com/solidarytech/ngo-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8081
              protocol: TCP
          command: ["/bin/sh", "-c"]
          args:
            - |
              export DATABASE_URL=$(cat /shared/database_url)
              exec opentelemetry-instrument gunicorn --bind 0.0.0.0:8081 --workers 2 --timeout 60 --access-logfile - app:app
          env:
            - name: PORT
              value: "8081"
            - name: APP_ENV
              value: "production"
          volumeMounts:
            - name: shared-data
              mountPath: /shared
              readOnly: true
          readinessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 512Mi

      volumes:
        - name: shared-data
          emptyDir: {}
