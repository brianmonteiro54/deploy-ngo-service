## ──────────────────────────────────────────────
## ExternalSecret: credenciais do RDS (gerenciadas pela AWS)
## IMPORTANTE: troque o UUID pelo nome real do secret do SEU banco ngo.
## Como achar: Console AWS > Secrets Manager > filtre por "rds!db-".
## ──────────────────────────────────────────────
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ngo-service-rds
  namespace: solidarytech-ngo
  labels:
    app.kubernetes.io/name: ngo-service
    app.kubernetes.io/component: ngo
    app.kubernetes.io/part-of: solidarytech
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager-us-east-1
    kind: SecretStore
  target:
    name: ngo-service-rds
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: rds!db-REPLACE_WITH_NGO_DB_SECRET_UUID
        property: username
    - secretKey: password
      remoteRef:
        key: rds!db-REPLACE_WITH_NGO_DB_SECRET_UUID
        property: password
---
## ──────────────────────────────────────────────
## ExternalSecret: config do ngo-service
## Source: solidarytech/ngo-service (AWS Secrets Manager)
##
## Crie esse secret no Secrets Manager com as chaves:
##   NGO_DB_HOST -> endpoint do RDS ngo (terraform output rds_endpoints)
##   NGO_DB_PORT -> "5432"
##   NGO_DB_NAME -> "ngo_db"
## ──────────────────────────────────────────────
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ngo-service-config
  namespace: solidarytech-ngo
  labels:
    app.kubernetes.io/name: ngo-service
    app.kubernetes.io/component: ngo
    app.kubernetes.io/part-of: solidarytech
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager-us-east-1
    kind: SecretStore
  target:
    name: ngo-service-config
    creationPolicy: Owner
  data:
    - secretKey: NGO_DB_HOST
      remoteRef:
        key: solidarytech/ngo-service
        property: NGO_DB_HOST
    - secretKey: NGO_DB_PORT
      remoteRef:
        key: solidarytech/ngo-service
        property: NGO_DB_PORT
    - secretKey: NGO_DB_NAME
      remoteRef:
        key: solidarytech/ngo-service
        property: NGO_DB_NAME
