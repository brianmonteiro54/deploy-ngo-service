## ──────────────────────────────────────────────
## Job: inicialização do banco do ngo-service
## Sync Hook do ArgoCD (wave 1). SQL idempotente (IF NOT EXISTS +
## ON CONFLICT DO NOTHING) — seguro re-rodar.
## ──────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: ngo-db-init-sql
  namespace: solidarytech-ngo
  labels:
    app.kubernetes.io/name: ngo-service
    app.kubernetes.io/component: ngo
    app.kubernetes.io/part-of: solidarytech
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "1"
data:
  init.sql: |
    CREATE TABLE IF NOT EXISTS ngos (
        id SERIAL PRIMARY KEY,
        name VARCHAR(150) NOT NULL,
        email VARCHAR(100) UNIQUE NOT NULL,
        cause VARCHAR(100) NOT NULL, -- Ex: Proteção Animal, Educação, Fome
        city VARCHAR(100) NOT NULL,
        created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP
    );

    INSERT INTO ngos (name, email, cause, city) VALUES
    ('Anjos de Patas', 'contato@anjosdepatas.org', 'Proteção Animal', 'Osasco'),
    ('Educa Mais', 'info@educamais.org', 'Educação', 'São Paulo')
    ON CONFLICT (email) DO NOTHING;
---
apiVersion: batch/v1
kind: Job
metadata:
  name: ngo-db-init
  namespace: solidarytech-ngo
  labels:
    app.kubernetes.io/name: ngo-service
    app.kubernetes.io/component: ngo
    app.kubernetes.io/part-of: solidarytech
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "1"
spec:
  backoffLimit: 5
  activeDeadlineSeconds: 300
  ttlSecondsAfterFinished: 120
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ngo-service
        app.kubernetes.io/component: db-init
    spec:
      restartPolicy: Never
      containers:
        - name: psql-init
          image: postgres:16-alpine
          command:
            - /bin/sh
            - -c
            - |
              echo "Executando init.sql em ${PGHOST}:${PGPORT}/${PGDATABASE}..."
              psql -f /mnt/init.sql
              RESULT=$?
              if [ $RESULT -eq 0 ]; then
                echo "Init do banco ngo concluído com sucesso!"
              else
                echo "Erro ao executar init.sql (exit code: $RESULT)"
                exit $RESULT
              fi
          env:
            - name: PGHOST
              valueFrom:
                secretKeyRef:
                  name: ngo-service-config
                  key: NGO_DB_HOST
            - name: PGPORT
              valueFrom:
                secretKeyRef:
                  name: ngo-service-config
                  key: NGO_DB_PORT
            - name: PGDATABASE
              valueFrom:
                secretKeyRef:
                  name: ngo-service-config
                  key: NGO_DB_NAME
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: ngo-service-rds
                  key: username
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: ngo-service-rds
                  key: password
            - name: PGSSLMODE
              value: "require"
          volumeMounts:
            - name: init-sql
              mountPath: /mnt
      volumes:
        - name: init-sql
          configMap:
            name: ngo-db-init-sql
